version: 2

# 依存関係の自動更新。セキュリティ修正・バージョン追随を PR で受け取る。
# GitHub Actions も対象にし、Node20 deprecation 等のアクション更新を自動化する。
updates:
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
    labels:
      - dependencies
      - backend

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
    labels:
      - dependencies
      - frontend
    # メジャー更新は破壊的変更（移行作業 + 目視リグレッション）を伴うため
    # Dependabot の自動 PR からは除外し、専用ブランチで段階移行する。
    # tailwindcss 3→4 / eslint 9→10 系がこれに該当（patch/minor は通常どおり受け取る）。
    ignore:
      - dependency-name: 'tailwindcss'
        update-types: ['version-update:semver-major']
      - dependency-name: '@eslint/js'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(ci)'
    labels:
      - dependencies
      - ci

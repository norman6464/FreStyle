name: CD - Backend Deploy to ECS

# 目的: バックエンドを ECS にデプロイする。CI と分離し、明示的トリガーのみで動く。
# トリガー:
#   - workflow_dispatch（手動）  : メインの起動経路
#   - tag push (release/v*)     : リリースタグ付与でデプロイ
#
# main への通常 push では動かない。ドキュメント変更などで誤ってデプロイされない。
#
# 仕組み:
#   1) Docker image を ECR に push (:latest と :${sha} の両方)
#   2) force-new-deployment でローリング再起動（新タスクが :latest を pull）
#
# タスク定義・ECS サービス・ALB は infra リポの Terraform（ecs.tf）が管理する（2026-06 移行済・
# 旧 CloudFormation スタックは全撤去）。本 CD はイメージ push と再起動だけを担い、
# インフラ定義には触れない（FRESTYLE-61）。
#
# 認証: GitHub OIDC + IAM Role (frestyle-prod-github-actions-role)
#       Step 3 で導入。長寿命の AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY は廃止。
#
# 必要な GitHub Secrets（事前セットアップが必要）:
#   - AWS_ECR_API_SERVER_REPOSITORY : 例 fre-style
#     ※ 旧 CFn デプロイ時代の COGNITO_* / IAC_REPO / IAC_REPO_TOKEN は不要になった
#       （タスク定義の env / secrets は infra リポの Terraform ecs.tf が持つ）
# 詳細は .github/workflows/README.md 参照

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '本番デプロイ確認用に "deploy" と入力してください'
        required: true
        type: string
  push:
    tags:
      - 'release/v*'

env:
  AWS_REGION: ap-northeast-1
  CLUSTER: frestyle-prod
  SERVICE: frestyle-prod-svc
  AWS_ROLE_ARN: arn:aws:iam::010928196665:role/frestyle-prod-github-actions-role

permissions:
  id-token: write
  contents: read

# 同時実行を直列化する。mutable タグ(:latest / :coderunner-latest)への push と
# deploy(force-new-deployment) が並行 run で競合し、意図しないイメージが反映されるのを防ぐ。
# 進行中の deploy は中断しない(cancel-in-progress: false)。後続 run は待機して順に実行する。
concurrency:
  group: cd-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  guard:
    name: Confirm input (workflow_dispatch only)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Verify confirmation input
        run: |
          if [ "${{ inputs.confirm }}" != "deploy" ]; then
            echo "ERROR: confirm に 'deploy' と入力されていません。中止します。"
            exit 1
          fi

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [guard]
    if: always() && (github.event_name == 'push' || needs.guard.result == 'success')

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: frestyle-cd-backend-build
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.AWS_ECR_API_SERVER_REPOSITORY }}
        run: |
          echo "image_tag=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build production image (Go backend)
        working-directory: backend
        run: |
          docker buildx build --platform linux/amd64 \
            -t temp_api_image_name:latest --load .

      - name: Tag and push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.AWS_ECR_API_SERVER_REPOSITORY }}
        run: |
          docker image tag temp_api_image_name:latest $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker image tag temp_api_image_name:latest $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      # コード実行サイドカー(code-runner)のイメージを同じ ECR リポに coderunner-* タグで push する。
      # ECS タスク定義(infra Terraform ecs.tf)が :coderunner-latest を参照する。
      # 同一 run の後続 deploy より前に push されるため、サイドカー参照が解決できる(docs/36 §6)。
      - name: Build & push code-runner image
        working-directory: backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.AWS_ECR_API_SERVER_REPOSITORY }}
        run: |
          docker buildx build --platform linux/amd64 \
            -f Dockerfile.coderunner \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:coderunner-latest" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:coderunner-${{ github.sha }}" \
            --push .

  deploy:
    name: ECS Rolling Deploy
    runs-on: ubuntu-latest
    needs: [build-and-push]
    timeout-minutes: 20
    # 本番反映ジョブは production Environment に紐付け、required reviewers の承認待ちで止める。
    # ＝ 誰が起動しても、norman6464 が承認するまで本番には反映されない。
    environment: production

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: frestyle-cd-backend-deploy
          aws-region: ${{ env.AWS_REGION }}

      # タスク定義は infra リポの Terraform(ecs.tf)が :latest / :coderunner-latest を参照して
      # 管理する。build-and-push が新イメージを push 済みなので、force-new-deployment の
      # ローリング再起動だけで新イメージが pull される(タスク定義の再登録は不要)。
      - name: Force new deployment (rolling restart)
        run: |
          aws ecs update-service --region "$AWS_REGION" \
            --cluster "$CLUSTER" --service "$SERVICE" \
            --force-new-deployment \
            --query 'service.deployments[0].status' --output text

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable --region "$AWS_REGION" \
            --cluster "$CLUSTER" --services "$SERVICE"

      # normanblog.com/api/* は CloudFront(SPA fallback)が一律 200 を返して誤判定するため、
      # ALB に直結する api.normanblog.com を叩く。パスは Go/Gin の /api/v2/health
      # (旧 Spring の /actuator/health は撤去済)。
      - name: Verify health
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "https://api.normanblog.com/api/v2/health"; then
              echo "✅ Healthy"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

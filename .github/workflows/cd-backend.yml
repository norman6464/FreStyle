name: CD - Backend Deploy to ECS

# 目的: バックエンドを ECS にデプロイする。CI と分離し、明示的トリガーのみで動く。
# トリガー:
#   - workflow_dispatch（手動）  : メインの起動経路
#   - tag push (release/v*)     : リリースタグ付与でデプロイ
#
# main への通常 push では動かない。ドキュメント変更などで誤ってデプロイされない。

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '本番デプロイ確認用に "deploy" と入力してください'
        required: true
        type: string
  push:
    tags:
      - 'release/v*'

env:
  AWS_REGION: ap-northeast-1
  ECS_SERVICE: fre-style-service
  ECS_CLUSTER: fre-style-cluster
  ECS_TASK_DEFINITION: .aws/task-definition.json

permissions:
  contents: read

jobs:
  guard:
    name: Confirm input (workflow_dispatch only)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Verify confirmation input
        run: |
          if [ "${{ inputs.confirm }}" != "deploy" ]; then
            echo "ERROR: confirm に 'deploy' と入力されていません。中止します。"
            exit 1
          fi

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [guard]
    if: always() && (github.event_name == 'push' || needs.guard.result == 'success')
    defaults:
      run:
        working-directory: FreStyle

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build production image
        run: docker image build --target production -t temp_api_image_name:latest .

      - name: Tag and push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.AWS_ECR_API_SERVER_REPOSITORY }}
        run: |
          docker image tag temp_api_image_name:latest $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker image tag temp_api_image_name:latest $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-and-push]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Render X-Ray daemon container
        id: render-xray
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: xray-daemon
          image: public.ecr.aws/xray/aws-xray-daemon:latest

      - name: Render app container
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.render-xray.outputs.task-definition }}
          container-name: fre-style
          image: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.AWS_ECR_API_SERVER_REPOSITORY }}:latest
          environment-variables: |
            DB_URL=${{ secrets.DB_URL }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASS=${{ secrets.DB_PASS }}
            AWS_ACCESS_KEY=${{ secrets.SPRING_AWS_ACCESS_KEY }}
            AWS_SECRET_KEY=${{ secrets.SPRING_AWS_SECRET_KEY }}
            AWS_REGION=${{ env.AWS_REGION }}
            COGNITO_CLIENT_ID=${{ secrets.COGNITO_CLIENT_ID }}
            COGNITO_CLIENT_SECRET=${{ secrets.COGNITO_CLIENT_SECRET }}
            COGNITO_REDIRECT_URI=${{ secrets.COGNITO_REDIRECT_URI }}
            COGNITO_TOKEN_URI=${{ secrets.COGNITO_TOKEN_URI }}
            COGNITO_JWK_SET_URI=${{ secrets.COGNITO_JWK_SET_URI }}
            DYNAMODB_AI_CHAT_TABLE=${{ secrets.DYNAMODB_AI_CHAT_TABLE }}
            DYNAMODB_CHAT_TABLE=${{ secrets.DYNAMODB_CHAT_TABLE }}
            NOTE_IMAGES_BUCKET=${{ secrets.NOTE_IMAGES_BUCKET }}
            NOTE_IMAGES_CDN_URL=${{ secrets.NOTE_IMAGES_CDN_URL }}
            SQS_REPORT_QUEUE_URL=${{ secrets.SQS_REPORT_QUEUE_URL }}

      - name: Deploy task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

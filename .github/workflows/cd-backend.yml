name: CD - Backend Deploy to ECS

# 目的: バックエンドを ECS にデプロイする。CI と分離し、明示的トリガーのみで動く。
# トリガー:
#   - workflow_dispatch（手動）  : メインの起動経路
#   - tag push (release/v*)     : リリースタグ付与でデプロイ
#
# main への通常 push では動かない。ドキュメント変更などで誤ってデプロイされない。
#
# 仕組み:
#   1) Docker image を ECR に push (:latest と :${sha} の両方)
#   2) frestyle-infrastructure リポの CFn テンプレートを使って
#      ECS Cluster + Service + Task Definition を CFn deploy
#      （GitHub Secrets を parameter-overrides 経由で渡す）
#   3) force-new-deployment でローリング再起動
#
# 認証: GitHub OIDC + IAM Role (frestyle-prod-github-actions-role)
#       Step 3 で導入。長寿命の AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY は廃止。
#
# 必要な GitHub Secrets（事前セットアップが必要）:
#   - AWS_ECR_API_SERVER_REPOSITORY              : 例 fre-style
#   - COGNITO_CLIENT_ID / COGNITO_REDIRECT_URI / COGNITO_TOKEN_URI / COGNITO_JWK_SET_URI
#     ※ COGNITO_CLIENT_SECRET と DB password は AWS Secrets Manager に保管済み（Step 2 で導入）
#     ※ ECS タスクは Task Role を使うため SPRING_AWS_ACCESS_KEY/SECRET は廃止（Step 1 で導入）
#   - IAC_REPO_TOKEN  : frestyle-infrastructure (private repo) 読み取り用 PAT
# 詳細は .github/workflows/README.md 参照

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '本番デプロイ確認用に "deploy" と入力してください'
        required: true
        type: string
  push:
    tags:
      - 'release/v*'

env:
  AWS_REGION: ap-northeast-1
  PROJECT: frestyle
  ENV: prod
  STACK_PFX: frestyle-prod
  IAC_REPO: norman6464/frestyle-infrastructure
  AWS_ROLE_ARN: arn:aws:iam::010928196665:role/frestyle-prod-github-actions-role

permissions:
  id-token: write
  contents: read

jobs:
  guard:
    name: Confirm input (workflow_dispatch only)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Verify confirmation input
        run: |
          if [ "${{ inputs.confirm }}" != "deploy" ]; then
            echo "ERROR: confirm に 'deploy' と入力されていません。中止します。"
            exit 1
          fi

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [guard]
    if: always() && (github.event_name == 'push' || needs.guard.result == 'success')

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: frestyle-cd-backend-build
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.AWS_ECR_API_SERVER_REPOSITORY }}
        run: |
          echo "image_tag=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image (Go backend)
        working-directory: backend
        run: |
          docker buildx build --platform linux/amd64 \
            -t temp_api_image_name:latest --load .

      - name: Tag and push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.AWS_ECR_API_SERVER_REPOSITORY }}
        run: |
          docker image tag temp_api_image_name:latest $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker image tag temp_api_image_name:latest $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

  cfn-deploy:
    name: CloudFormation Deploy (ECS Stack)
    runs-on: ubuntu-latest
    needs: [build-and-push]
    timeout-minutes: 20

    steps:
      # IaC リポを clone（プライベートなので gh CLI 経由でトークン認証）
      - name: Checkout frestyle-infrastructure
        uses: actions/checkout@v4
        with:
          repository: ${{ env.IAC_REPO }}
          token: ${{ secrets.IAC_REPO_TOKEN }}
          path: iac

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: frestyle-cd-backend-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve dependent stack outputs
        id: deps
        run: |
          ECS_SG=$(aws cloudformation describe-stacks --region $AWS_REGION \
            --stack-name $STACK_PFX-sg \
            --query 'Stacks[0].Outputs[?OutputKey==`EcsServiceSecurityGroupId`].OutputValue' --output text)
          TG_ARN=$(aws cloudformation describe-stacks --region $AWS_REGION \
            --stack-name $STACK_PFX-alb \
            --query 'Stacks[0].Outputs[?OutputKey==`TargetGroupArn`].OutputValue' --output text)
          # PostgreSQL に切替済 (frestyle-prod-rds-postgres)
          DB_HOST=$(aws cloudformation describe-stacks --region $AWS_REGION \
            --stack-name $STACK_PFX-rds-postgres \
            --query 'Stacks[0].Outputs[?OutputKey==`DBEndpoint`].OutputValue' --output text)
          DB_PORT=$(aws cloudformation describe-stacks --region $AWS_REGION \
            --stack-name $STACK_PFX-rds-postgres \
            --query 'Stacks[0].Outputs[?OutputKey==`DBPort`].OutputValue' --output text)
          DB_NAME=$(aws cloudformation describe-stacks --region $AWS_REGION \
            --stack-name $STACK_PFX-rds-postgres \
            --query 'Stacks[0].Outputs[?OutputKey==`DBName`].OutputValue' --output text)
          S3_BUCKET=$(aws cloudformation describe-stacks --region $AWS_REGION \
            --stack-name $STACK_PFX-s3 \
            --query 'Stacks[0].Outputs[?OutputKey==`NoteImagesBucketName`].OutputValue' --output text)
          SQS_URL=$(aws cloudformation describe-stacks --region $AWS_REGION \
            --stack-name $STACK_PFX-sqs \
            --query 'Stacks[0].Outputs[?OutputKey==`ReportQueueUrl`].OutputValue' --output text)
          EXEC_ROLE=$(aws cloudformation describe-stacks --region $AWS_REGION \
            --stack-name $STACK_PFX-iam \
            --query 'Stacks[0].Outputs[?OutputKey==`TaskExecutionRoleArn`].OutputValue' --output text)
          TASK_ROLE=$(aws cloudformation describe-stacks --region $AWS_REGION \
            --stack-name $STACK_PFX-iam \
            --query 'Stacks[0].Outputs[?OutputKey==`TaskRoleArn`].OutputValue' --output text)
          # PostgreSQL master password の Secret に切替
          DB_PWD_ARN=$(aws secretsmanager describe-secret --region $AWS_REGION \
            --secret-id $STACK_PFX/pg-master-password --query 'ARN' --output text)
          COG_SEC_ARN=$(aws secretsmanager describe-secret --region $AWS_REGION \
            --secret-id $STACK_PFX/cognito-client-secret --query 'ARN' --output text)

          echo "ecs_sg=$ECS_SG" >> "$GITHUB_OUTPUT"
          echo "tg_arn=$TG_ARN" >> "$GITHUB_OUTPUT"
          echo "db_host=$DB_HOST" >> "$GITHUB_OUTPUT"
          echo "db_port=$DB_PORT" >> "$GITHUB_OUTPUT"
          echo "db_name=$DB_NAME" >> "$GITHUB_OUTPUT"
          echo "s3_bucket=$S3_BUCKET" >> "$GITHUB_OUTPUT"
          echo "sqs_url=$SQS_URL" >> "$GITHUB_OUTPUT"
          echo "exec_role=$EXEC_ROLE" >> "$GITHUB_OUTPUT"
          echo "task_role=$TASK_ROLE" >> "$GITHUB_OUTPUT"
          echo "db_pwd_arn=$DB_PWD_ARN" >> "$GITHUB_OUTPUT"
          echo "cog_sec_arn=$COG_SEC_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy ECS stack
        env:
          ECS_SG: ${{ steps.deps.outputs.ecs_sg }}
          TG_ARN: ${{ steps.deps.outputs.tg_arn }}
          DB_HOST: ${{ steps.deps.outputs.db_host }}
          DB_PORT: ${{ steps.deps.outputs.db_port }}
          DB_NAME: ${{ steps.deps.outputs.db_name }}
          S3_BUCKET: ${{ steps.deps.outputs.s3_bucket }}
          SQS_URL: ${{ steps.deps.outputs.sqs_url }}
          EXEC_ROLE: ${{ steps.deps.outputs.exec_role }}
          TASK_ROLE: ${{ steps.deps.outputs.task_role }}
          DB_PWD_ARN: ${{ steps.deps.outputs.db_pwd_arn }}
          COG_SEC_ARN: ${{ steps.deps.outputs.cog_sec_arn }}
        run: |
          aws cloudformation deploy --region $AWS_REGION \
            --stack-name $STACK_PFX-ecs \
            --template-file iac/infrastructure/cloudformation/templates/runtime/ecs.yml \
            --parameter-overrides \
              Environment=$ENV \
              EcsServiceSecurityGroupId="$ECS_SG" \
              TargetGroupArn="$TG_ARN" \
              DBHost="$DB_HOST" \
              DBPort="$DB_PORT" \
              DBName="$DB_NAME" \
              DBUser=postgres \
              DBPasswordSecretArn="$DB_PWD_ARN" \
              CognitoClientId="${{ secrets.COGNITO_CLIENT_ID }}" \
              CognitoClientSecretArn="$COG_SEC_ARN" \
              CognitoRedirectUri="${{ secrets.COGNITO_REDIRECT_URI }}" \
              CognitoTokenUri="${{ secrets.COGNITO_TOKEN_URI }}" \
              CognitoJwkSetUri="${{ secrets.COGNITO_JWK_SET_URI }}" \
              NoteImagesBucket="$S3_BUCKET" \
              SqsReportQueueUrl="$SQS_URL" \
              ExecutionRoleArn="$EXEC_ROLE" \
              TaskRoleArn="$TASK_ROLE" \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --tags Project=FreStyle Environment=$ENV ManagedBy=CloudFormation

      - name: Force new deployment (rolling restart)
        run: |
          aws ecs update-service --region $AWS_REGION \
            --cluster $STACK_PFX --service $STACK_PFX-svc \
            --force-new-deployment \
            --query 'service.deployments[0].status' --output text

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable --region $AWS_REGION \
            --cluster $STACK_PFX --services $STACK_PFX-svc

      - name: Verify health
        run: |
          ALB_DNS=$(aws cloudformation describe-stacks --region $AWS_REGION \
            --stack-name $STACK_PFX-alb \
            --query 'Stacks[0].Outputs[?OutputKey==`LoadBalancerDnsName`].OutputValue' --output text)
          echo "ALB DNS: $ALB_DNS"
          for i in 1 2 3 4 5; do
            if curl -fsS "http://$ALB_DNS/actuator/health"; then
              echo "✅ Healthy"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

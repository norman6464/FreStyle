name: CD - Frontend Deploy to S3 + CloudFront

# 目的: フロントエンドを S3 にデプロイ + CloudFront キャッシュ無効化。
# CI と分離し、明示的トリガーのみで動く。
# トリガー:
#   - workflow_dispatch（手動）  : メイン
#   - tag push (release/v*)     : リリースタグ付与でデプロイ

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '本番デプロイ確認用に "deploy" と入力してください'
        required: true
        type: string
  push:
    tags:
      - 'release/v*'

env:
  AWS_REGION: ap-northeast-1

permissions:
  contents: read

jobs:
  guard:
    name: Confirm input (workflow_dispatch only)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Verify confirmation input
        run: |
          if [ "${{ inputs.confirm }}" != "deploy" ]; then
            echo "ERROR: confirm に 'deploy' と入力されていません。中止します。"
            exit 1
          fi

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [guard]
    if: always() && (github.event_name == 'push' || needs.guard.result == 'success')
    defaults:
      run:
        working-directory: ./frontend

    env:
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_WEB_SOCKET_URL_AI_CHAT: ${{ secrets.VITE_WEB_SOCKET_URL_AI_CHAT }}
      VITE_WEB_SOCKET_URL_CHAT: ${{ secrets.VITE_WEB_SOCKET_URL_CHAT }}
      VITE_COGNITO_DOMAIN: ${{ secrets.VITE_COGNITO_DOMAIN }}
      VITE_CLIENT_ID: ${{ secrets.VITE_CLIENT_ID }}
      VITE_REDIRECT_URI: ${{ secrets.VITE_REDIRECT_URI }}
      VITE_RESPONSE_TYPE: ${{ secrets.VITE_RESPONSE_TYPE }}
      VITE_SCOPE: ${{ secrets.VITE_SCOPE }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync dist/ s3://fre-style-bucket --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

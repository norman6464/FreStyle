name: CI - Backend (Go)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend-go.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend-go.yml'

jobs:
  test:
    name: vet / test / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: go build -trimpath -ldflags="-s -w" -o /tmp/frestyle-backend ./cmd/server

      - name: Show binary size
        run: ls -lh /tmp/frestyle-backend

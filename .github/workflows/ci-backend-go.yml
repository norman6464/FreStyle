name: CI - Backend (Go)

# path フィルタは付けない: 必須ステータスチェック（branch protection）として使うため、
# 対象外パスの PR でも必ず report されるよう全 PR / main push で走らせる。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: vet / test / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: go mod download
        run: go mod download

      # go.mod / go.sum が tidy か検証する（未使用依存・取りこぼしを CI で検知）。
      - name: go mod tidy check
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "::error::go.mod/go.sum is not tidy. Run 'go mod tidy' in backend/ and commit."
            git diff go.mod go.sum
            exit 1
          fi

      # gofumpt 未整形のコードがあれば失敗させる。
      # gofmt は構文整形のみだが gofumpt はその上位互換で、空行・連続宣言の整列・
      # 不要な括弧改行など「人が迷う整形」も機械的に統一する。Effective Go の
      # "gofmt'd code is the standard" を一段強く CI で強制する入り口チェック。
      # `gofumpt -l .` が 1 ファイルでも出したら fail にし、ローカル `make fmt`
      # (= gofumpt -w) で直してもらう運用にする。生成コードは gofumpt clean のため除外不要。
      - name: gofumpt check
        run: |
          go install mvdan.cc/gofumpt@v0.10.0
          unformatted=$("$(go env GOPATH)/bin/gofumpt" -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofumpt-formatted:"
            echo "$unformatted"
            echo "Run 'make fmt' (gofumpt -w) in backend/ locally and commit the result."
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      # golangci-lint(v2) で複数 linter を一括実行する。default の
      # staticcheck / errcheck / govet / ineffassign / unused に加え、
      # errorlint(errors.Is/As・%w 強制) / bodyclose(HTTP body リーク) /
      # gosec(セキュリティ) / misspell / unconvert を有効化。設定は backend/.golangci.yml。
      # 従来の単体 staticcheck step を置き換える(staticcheck は golangci に内包)。
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          working-directory: backend

      # クリーンアーキテクチャ依存方向ルール（CLAUDE.md §2）を検証する自作 linter。
      # handler→usecase→repository/infra→domain の矢印に反する import を CI で弾く。
      - name: archlint (clean architecture deps)
        run: go run ./cmd/archlint .

      # Gin ルートと swaggo @Router 注釈の整合（CLAUDE.md §2.7）を検証する自作 linter。
      # ルート（HTTP method + path）と @Router 宣言の不一致・注釈漏れを CI で弾く。
      - name: apispec-lint (route ↔ swaggo annotation)
        run: go run ./cmd/apispec-lint .

      # usecase の命名・構造規約（CLAUDE.md §2.3）を検証する自作 linter。
      # XxxUseCase に NewXxxUseCase コンストラクタと Execute メソッドがあるかを CI で検査する。
      - name: naminglint (usecase naming)
        run: go run ./cmd/naminglint .

      # govulncheck は Go 公式の脆弱性スキャナ。実際に呼んでいるコードパスに該当する
      # 既知 CVE だけを報告する。stdlib の CVE は Go パッチ追随次第で頻出するため、
      # CI を止めずに「可視化」目的の非ブロッキング（continue-on-error）にする。
      # ブロッキングなセキュリティ検査は CodeQL (codeql.yml) が担う。
      - name: govulncheck (advisory)
        continue-on-error: true
        run: |
          set -o pipefail
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./... | tee /tmp/govuln.txt
          {
            echo "## govulncheck (advisory)"
            echo '```'
            tail -5 /tmp/govuln.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # race detector + カバレッジ計測。rate limiter / JWT キャッシュ等の並行コードの
      # データ競合を CI で検出する。
      - name: go test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      # 総カバレッジを PR の Checks サマリに表示しつつ、floor を下回ったら fail させる。
      # COVERAGE_MIN は回帰防止の floor（domain / docs / cmd / 薄い infra など 0% 群を含む
      # 総計のため低め）。カバレッジ向上に合わせてラチェット的に引き上げる。
      - name: coverage summary + gate
        env:
          COVERAGE_MIN: '49'
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}')
          echo "## Backend test coverage: ${total} (min ${COVERAGE_MIN}%)" >> "$GITHUB_STEP_SUMMARY"
          echo "total coverage: ${total} (min ${COVERAGE_MIN}%)"
          num=${total%\%}
          if awk -v t="$num" -v m="$COVERAGE_MIN" 'BEGIN { exit !(t+0 < m+0) }'; then
            echo "::error::backend coverage ${total} is below floor ${COVERAGE_MIN}%"
            exit 1
          fi

      # OpenAPI spec (docs/) が最新かを検証する。handler の swaggo 注釈を変えたのに
      # `make openapi` を忘れた PR を CI で弾く（フロントの型生成元なので drift を防ぐ）。
      - name: OpenAPI drift check
        run: |
          make openapi
          # 変更だけでなく未追跡の新規生成ファイルも検知するため porcelain で判定する。
          if [ -n "$(git status --porcelain -- docs/)" ]; then
            echo "::error::OpenAPI docs are out of date. Run 'make openapi' in backend/ and commit docs/."
            git status --porcelain -- docs/
            git diff -- docs/
            exit 1
          fi

      - name: go build
        run: go build -trimpath -ldflags="-s -w" -o /tmp/frestyle-backend ./cmd/server

      - name: Show binary size
        run: ls -lh /tmp/frestyle-backend

  # repository(adapter/persistence) 層の結合テストを、本物の PostgreSQL に対して回す。
  # docker-compose.integration.yml で postgres-integration-test を起動し、
  # -tags=integration のテストだけを実行する（単体ジョブとは独立）。
  integration:
    name: integration tests (postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: go mod download
        run: go mod download

      # 本物の PostgreSQL を起動し healthcheck が通るまで待つ（--wait）。
      # Docker Hub の pull は runner 上で transient に timeout することがあるためリトライする。
      - name: Start PostgreSQL (docker compose)
        run: |
          for i in 1 2 3; do
            docker compose -f docker-compose.integration.yml pull --quiet && break
            echo "image pull failed (attempt $i/3), retrying in 10s..."
            sleep 10
          done
          docker compose -f docker-compose.integration.yml up -d --wait

      # -run Integration で結合テスト（命名規約: テスト名に Integration を含む）だけを回す。
      # 単体テストは test ジョブで実行済みで、TEST_DATABASE_URL を env に持つこのジョブで
      # 再実行すると env 依存の単体テストが誤検知し得るため。
      - name: Run integration tests (-tags=integration)
        env:
          TEST_DATABASE_URL: postgres://frestyle:frestyle@localhost:5433/frestyle_integration?sslmode=disable
        run: go test -tags=integration -run Integration ./...

      - name: Stop PostgreSQL
        if: always()
        run: docker compose -f docker-compose.integration.yml down -v

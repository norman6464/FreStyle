name: CI - Backend (Spring Boot)

# 目的: PR / push のたびにバックエンドのテストとビルド検証だけを行う。
# 本ワークフローは AWS リソースには一切触らない。デプロイは cd-backend.yml で別途実行。

on:
  pull_request:
    branches: [main]
    paths:
      - 'FreStyle/**'
      - '.github/workflows/ci-backend.yml'
  push:
    branches: [main]
    paths:
      - 'FreStyle/**'
      - '.github/workflows/ci-backend.yml'

permissions:
  contents: read

jobs:
  test:
    name: Gradle Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: FreStyle

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: FreStyle/build/reports/tests/test
          retention-days: 7

  build:
    name: Docker Image Build (verify only)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (no push)
        # ビルドが通るかだけ確認。タグ付け / push は CD 側で実施。
        run: docker image build --target production -t frestyle:ci-${{ github.sha }} ./FreStyle

name: CI - Frontend (Vite + Vitest)

# 目的: PR / push のたびにフロントエンドのテストとビルド検証だけを行う。
# 本ワークフローは S3 / CloudFront に一切触らない。デプロイは cd-frontend.yml で別途。

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'

permissions:
  contents: read

jobs:
  test-and-build:
    name: Vitest + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # TypeScript 型チェック (production code 限定 / test ファイルは tsconfig.exclude で除外済み)。
      # tsc が 1 エラーでも報告したら fail する。React / TypeScript Handbook の
      # "static type-checking before runtime" を CI で強制する。
      - name: TypeScript type-check
        run: npx tsc --noEmit

      # ESLint で 1 件でも warning があれば fail させる（将来のドリフト防止）。
      # rules は eslint.config.js で管理。
      - name: ESLint (max-warnings=0)
        run: npx eslint . --max-warnings=0

      - name: Run Vitest
        run: npm test -- --run

      - name: Build (verify only)
        # ビルドが通るかだけ確認。S3 sync / CloudFront invalidation は CD 側で実施。
        env:
          # ビルド時の VITE_* は本番値ではなくダミーで OK（型チェック・syntax確認が目的）
          VITE_API_BASE_URL: https://example.invalid
          VITE_WEB_SOCKET_URL_AI_CHAT: wss://example.invalid
          VITE_WEB_SOCKET_URL_CHAT: wss://example.invalid
          VITE_COGNITO_DOMAIN: https://example.invalid
          VITE_CLIENT_ID: ci-dummy
          VITE_REDIRECT_URI: https://example.invalid/callback
          VITE_RESPONSE_TYPE: code
          VITE_SCOPE: openid
        run: npm run build

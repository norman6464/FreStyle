name: E2E - Playwright Smoke

# 目的: 本番 (https://normanblog.com / https://api.normanblog.com) に対する
# 認証前スモーク E2E を Playwright + Chromium で実行する。
# 失敗時は html report / trace / screenshot / video を artifact に残す。
#
# トリガー:
#   - main への push（cd-frontend / cd-backend が走った後の確認）
#   - PR (frontend / 主要 workflow / E2E 自体への変更)
#   - workflow_dispatch（任意のタイミングで実行）
#
# CodeBuild ではなく Actions に統一する判断:
#   - API は public ALB 経由でアクセス可能で VPC 内疎通は不要
#   - OIDC AssumeRole は今回 不要（外形監視）
#   - 既存 cd-* / scheduled-* と同 platform に集約してログ・通知を一元管理

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/e2e.yml'
      - '.github/workflows/cd-frontend.yml'
      - '.github/workflows/cd-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'PLAYWRIGHT_BASE_URL（既定 https://normanblog.com）'
        required: false
        default: 'https://normanblog.com'

permissions:
  contents: read

jobs:
  smoke:
    name: Playwright Smoke (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url || 'https://normanblog.com' }}
        run: npx playwright test --project=chromium

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload trace / screenshots / video on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 7

  # ローカルビルド + API モックによる「認証付き導線・主要画面」E2E。
  # 本番 Cognito / DB に触れず、/api/v2/** を Playwright route でモックして検証する。
  local-mocked:
    name: Playwright Local (mocked API)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # VITE_API_BASE_URL='' で同一オリジン相対 (/api/v2/*) にする。これにより index.html の
      # CSP connect-src 'self' に収まり、Playwright route がモックを差し込める（cross-origin の
      # ダミーホストは CSP でブロックされ route に到達しないため）。
      - name: Build (same-origin / API モック前提)
        env:
          VITE_API_BASE_URL: ''
          VITE_WEB_SOCKET_URL_AI_CHAT: wss://example.invalid
          VITE_WEB_SOCKET_URL_CHAT: wss://example.invalid
          VITE_COGNITO_DOMAIN: https://example.invalid
          VITE_CLIENT_ID: ci-dummy
          VITE_REDIRECT_URI: https://example.invalid/callback
          VITE_RESPONSE_TYPE: code
          VITE_SCOPE: openid
        run: npm run build

      - name: Run local mocked E2E
        run: npm run e2e:local

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-local
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload trace / screenshots / video on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-local
          path: frontend/test-results/
          retention-days: 7

name: Secret Scan (gitleaks)

# 目的: シークレット（AWS キー / Cognito シークレット / DB パスワード / トークン等）の
# 漏洩を検知する。GitHub の Push Protection（既知パターン）に加え、gitleaks で汎用パターン・
# 高エントロピー文字列・既存履歴も含めて多層防御する。
#
# - pull_request / push(main): PR・main の変更を検査
# - schedule: 毎週 全履歴をスキャン（過去のコミットに混入していないか）
# - 設定は リポジトリ直下の .gitleaks.toml（デフォルトルール + ローカル/テスト値の allowlist）

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1' # 毎週月曜 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 全履歴を取得して履歴スキャンを可能にする

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # git 履歴全体をスキャンする。検出があれば exit code 1 で CI を落とす。
      - name: Run gitleaks
        run: gitleaks git --no-banner --redact --verbose --exit-code 1

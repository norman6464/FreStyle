name: Vulnerability Scan (Trivy)

# 目的: 依存ライブラリの既知脆弱性（CVE）と Dockerfile/IaC の誤設定を検知する。
# govulncheck（Go・呼び出しパス基準・advisory）を補完し、npm/Go の依存を CVE データベースで
# 横断的に検査する。修正版が存在する HIGH/CRITICAL のみを fail 条件にして actionable に保つ。
#
# - --ignore-unfixed: 修正版が無い CVE では落とさない（対応不能なノイズを除外）
# - secret スキャンは gitleaks(secret-scan.yml) が担うため Trivy では無効

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1' # 毎週月曜 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy:
    name: trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        env:
          TRIVY_VERSION: '0.71.0'
        run: |
          curl -sSL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o /tmp/trivy.tar.gz
          tar -xzf /tmp/trivy.tar.gz -C /tmp trivy
          sudo mv /tmp/trivy /usr/local/bin/trivy
          trivy --version

      # backend: 依存 CVE（go.mod）+ Dockerfile の誤設定
      - name: Trivy scan (backend)
        run: trivy fs --scanners vuln,misconfig --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --no-progress backend

      # frontend: 依存 CVE（package-lock.json）
      - name: Trivy scan (frontend)
        run: trivy fs --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --no-progress frontend

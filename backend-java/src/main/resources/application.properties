spring.application.name=frestyle-backend
server.port=8080

# メモリ実測 / ローカル動作確認用にインメモリ H2 を使う。
# 本番は Supabase(PostgreSQL)に切り替える(SPRING_DATASOURCE_URL 等を環境変数で注入)。
spring.datasource.url=jdbc:h2:mem:frestyle;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.open-in-view=false

# スキーマは Flyway が所有する。Hibernate には DDL を触らせない(none)。
# これで「テーブルの正は db/migration の SQL」に一本化され、起動毎の暗黙 DDL を排除できる。
spring.jpa.hibernate.ddl-auto=none

# 既存スキーマ(現行 GORM 製)が入った本番 DB に後から Flyway を載せる場合の保険。
# 空でないスキーマにも baseline を切って migrate を開始できる(将来の本番接続用)。
spring.flyway.baseline-on-migrate=true

# ECS 0.25 vCPU / 0.5 GB を見据え、起動バナーを抑止。
spring.main.banner-mode=off

# 認証: Cognito User Pool の JWKS で access_token(JWT)の署名を検証する。
# 既定値は本番 Pool 2(ap-northeast-1_TkRen4lyD)。環境変数で上書きする。
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${COGNITO_JWK_SET_URI:https://cognito-idp.ap-northeast-1.amazonaws.com/ap-northeast-1_TkRen4lyD/.well-known/jwks.json}

# ログインフロー(認可コード→token 交換)用の Cognito 設定。ECS は env で注入する。
frestyle.cognito.admin-group=${COGNITO_ADMIN_GROUP:admin}
frestyle.cognito.client-id=${COGNITO_CLIENT_ID:}
frestyle.cognito.client-secret=${COGNITO_CLIENT_SECRET:}
frestyle.cognito.redirect-uri=${COGNITO_REDIRECT_URI:}
frestyle.cognito.token-uri=${COGNITO_TOKEN_URI:}

# 画像アップロード(S3 PUT 署名 URL)。bucket 未設定なら stub presigner にフォールバックする。
# 環境変数名は Go 版 ECS と揃える(NOTE_IMAGES_BUCKET / NOTE_IMAGES_CDN_URL / AWS_REGION)。
frestyle.s3.bucket=${NOTE_IMAGES_BUCKET:}
frestyle.s3.cdn-base=${NOTE_IMAGES_CDN_URL:}
frestyle.s3.region=${AWS_REGION:ap-northeast-1}

# AI チャットメッセージの DynamoDB。table 未設定なら stub reader/writer にフォールバックする。
frestyle.dynamo.ai-chat-table=${DYNAMODB_AI_CHAT_TABLE:}
frestyle.dynamo.region=${AWS_REGION:ap-northeast-1}

# AI チャットの Bedrock。model 未設定なら stub client にフォールバックする。
frestyle.bedrock.model-id=${BEDROCK_MODEL_ID:}
frestyle.bedrock.region=${AWS_REGION:ap-northeast-1}

# SSE ストリーミングの非同期リクエストタイムアウト(Bedrock 応答に余裕を持たせる)。
spring.mvc.async.request-timeout=300000

        "400":
          description: バリデーション or 実行 失敗
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: 未 認証
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - CookieAuth: []
      summary: コード サンドボックス 実行
      tags:
      - code-execution

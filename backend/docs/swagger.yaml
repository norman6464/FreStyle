info:
  contact:
    name: FreStyle Engineering
    url: https://normanblog.com
  description: |-
    新卒 IT エンジニア 向け 統合 研修 プラットフォーム の REST API。
    Clean Architecture (port = usecase/repository / adapter = adapter/persistence) で 構築。
  termsOfService: https://normanblog.com/terms
  title: FreStyle Backend API
  version: "2.0"
paths:
  /admin/audit-events:
    get:
      description: 管理者の重要操作（会社の有効/無効・従業員の停止/削除・招待など）の監査記録を新しい順で最大 200 件返す。super_admin
        専用。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_norman6464_FreStyle_backend_internal_domain.AuditEvent'
            type: array
        "401":
          description: 未認証
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "403":
          description: super_admin 以外
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: DB 失敗
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - CookieAuth: []
      summary: 監査ログ一覧（super_admin）
      tags:
      - admin
  /admin/companies:
    get:
      description: 全 company を 返す。 super_admin 専用 画面 用。 認可 は middleware で 別途 担保。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_norman6464_FreStyle_backend_internal_domain.Company'
            type: array
        "500":
          description: DB 失敗
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - CookieAuth: []
      summary: 会社 一覧 (SuperAdmin)
      tags:
      - admin
  /admin/companies/{id}/active:
    patch:
      consumes:
      - application/json
      description: 会社を無効化すると、その会社の全ユーザーがログイン/利用不可になる（middleware で弾く）。super_admin のみ。
      parameters:
      - description: 会社 ID
        in: path
        name: id
        required: true
        type: integer
      - description: active=false で無効化
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.setCompanyActiveRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.messageResponse'
        "400":
          description: 不正な ID / body
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: 未認証
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "403":
          description: super_admin 以外
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: 会社が存在しない
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: 更新失敗
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - CookieAuth: []

basePath: /api/v2
definitions:
  github_com_norman6464_FreStyle_backend_internal_domain.Health:
    properties:
      db:
        type: string
      status:
        type: string
    type: object
  github_com_norman6464_FreStyle_backend_internal_domain.Note:
    properties:
      content:
        type: string
      createdAt:
        type: string
      id:
        type: integer
      isPinned:
        type: boolean
      isPublic:
        type: boolean
      title:
        type: string
      updatedAt:
        type: string
      userId:
        type: integer
    type: object
  github_com_norman6464_FreStyle_backend_internal_domain.Notification:
    properties:
      body:
        type: string
      createdAt:
        type: string
      id:
        type: integer
      isRead:
        type: boolean
      title:
        type: string
      type:
        type: string
      userId:
        type: integer
    type: object
  github_com_norman6464_FreStyle_backend_internal_domain.ProfileView:
    properties:
      avatarUrl:
        type: string
      bio:
        type: string
      displayName:
        type: string
      email:
        description: |-
          Email は users.email を そのまま返す。 frontend の sidebar ユーザーメニューで
          「ログイン中のメールアドレスを 表示する」 用途で参照する。
        type: string
      status:
        type: string
      updatedAt:
        type: string
      userId:
        type: integer
    type: object
  github_com_norman6464_FreStyle_backend_internal_domain.SessionNote:
    properties:
      content:
        type: string
      createdAt:
        type: string
      id:
        type: integer
      sessionId:
        type: integer
      updatedAt:
        type: string
      userId:
        type: integer
    type: object
  internal_handler.cognitoCallbackReq:
    properties:
      code:
        type: string
      invitationToken:
        description: |-
          InvitationToken はフロントが sessionStorage から復元してくる、招待マジックリンク経由で
          受領した UUID トークン。任意。指定がある場合は upsert 時に email ベースの招待検索より
          優先して照合に使う（同じ email に複数 pending invitation がある異常系での誤一致を防ぐ）。
        type: string
    required:
    - code
    type: object
  internal_handler.errorResponse:
    properties:
      error:
        example: unauthorized
        type: string
    type: object
  internal_handler.invitationValidateResponse:
    properties:
      companyId:
        example: 1
        type: integer
      companyName:
        example: Example Corp
        type: string
      displayName:
        example: 山田 太郎
        type: string
      role:
        example: trainee
        type: string
    type: object
  internal_handler.meResponse:
    properties:
      cognitoSub:
        example: abc-123-uuid
        type: string
      companyId:
        example: 1
        type: integer
      createdAt:
        type: string
      displayName:
        example: 山田 太郎
        type: string
      email:
        example: user@example.com
        type: string
      groups:
        example:
        - admin
        items:
          type: string
        type: array
      id:
        example: 42
        type: integer
      isAdmin:
        example: false
        type: boolean
      onboarded:
        example: true
        type: boolean
      role:
        example: trainee
        type: string
      updatedAt:
        type: string
    type: object
  internal_handler.messageResponse:
    properties:
      message:
        example: ログインしました。
        type: string
    type: object
  internal_handler.noteCreateReq:
    properties:
      content:
        type: string
      isPinned:
        type: boolean
      isPublic:
        type: boolean
      title:
        type: string
    required:
    - title
    type: object
  internal_handler.noteUpdateReq:
    properties:
      content:
        type: string
      isPinned:
        type: boolean
      isPublic:
        type: boolean
      title:
        type: string
    required:
    - title
    type: object
  internal_handler.sessionNoteUpsertReq:
    properties:
      content:
        type: string
    type: object
  internal_handler.updateProfileReq:
    properties:
      avatarUrl:
        type: string
      bio:
        type: string
      displayName:
        description: '`name` は旧フロント実装の互換のため受け付け、`displayName` を優先する。'
        type: string
      iconUrl:
        description: 旧フロント実装が `iconUrl` で送ってきた場合の互換。
        type: string
      name:
        type: string
      status:
        type: string
    type: object
info:
  contact:
    name: FreStyle Engineering
    url: https://normanblog.com
  description: |-
    新卒 IT エンジニア 向け 統合 研修 プラットフォーム の REST API。
    Clean Architecture (port = usecase/repository / adapter = adapter/persistence) で 構築。
  termsOfService: https://normanblog.com/terms
  title: FreStyle Backend API
  version: "2.0"
paths:
  /auth/cognito/callback:
    post:
      consumes:
      - application/json
      description: Cognito Hosted UI から の callback。 authorization code を access /
        refresh / id token に 交換 し HttpOnly Cookie で 返す。 新規 user は 招待 or Cognito admin
        group 必須。
      parameters:
      - description: Cognito callback (code 必須、 invitationToken 任意)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.cognitoCallbackReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.messageResponse'
        "400":
          description: code 欠落 等
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: token 交換 失敗
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "403":
          description: 招待 なし の 新規 user
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: Cognito 未 設定 等 の 内部 エラー
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "502":
          description: Cognito 到達 不可
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      summary: Cognito callback (認可 コード → token 交換)
      tags:
      - auth
  /auth/cognito/logout:
    post:
      description: HttpOnly Cookie の access / refresh token を 消去 する。 Cognito 側 の セッション
        は 別途 hosted UI で 切る。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.messageResponse'
      summary: ログアウト
      tags:
      - auth
  /auth/cognito/refresh-token:
    post:
      description: refresh_token Cookie で access_token を 再 発行 し HttpOnly Cookie に
        セット する。 失敗 (refresh 切れ 等) は 401 で Cookie クリア。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.messageResponse'
        "401":
          description: refresh_token 欠落 / 無効
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "502":
          description: Cognito 到達 不可
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      summary: アクセス トークン リフレッシュ
      tags:
      - auth
  /auth/me:
    get:
      description: Cookie 認証 を 元 に 現在 ログイン 中 の user 情報 (id / email / role / isAdmin
        / onboarded 等) を 返す。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.meResponse'
        "401":
          description: 未 認証
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: DB に user が ない (Cognito 側 だけ 存在)
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: DB / repository 取得 失敗
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - CookieAuth: []
      summary: current user 情報 取得
      tags:
      - auth
  /health:
    get:
      description: バックエンド と DB の 疎通 を 確認 する。 ALB / CloudWatch / 監視 から 叩く 想定。
      produces:
      - application/json
      responses:
        "200":
          description: UP
          schema:
            $ref: '#/definitions/github_com_norman6464_FreStyle_backend_internal_domain.Health'
        "503":
          description: DB 切断 等 で DOWN
          schema:
            $ref: '#/definitions/github_com_norman6464_FreStyle_backend_internal_domain.Health'
      summary: ヘルスチェック
      tags:
      - health
  /invitations/accept/{token}:
    get:
      description: 招待 マジック リンク から 来た 未 ログイン user 用。 該当 / 期限 切れ / 既 受諾 等 は メタ 情報 を
        漏らさず 全て 404。
      parameters:
      - description: 招待 受諾 token (UUID)
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.invitationValidateResponse'
        "404":
          description: 招待 が 無効 / 期限 切れ
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: 内部 エラー
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      summary: 招待 トークン 検証 (公開 / 認証 不要)
      tags:
      - invitations
  /notes:
    get:
      description: current user の note を 更新 日 降順 で 返す。 IDOR 対策 で userId は 受け取らない。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_norman6464_FreStyle_backend_internal_domain.Note'
            type: array
        "400":
          description: DB 取得 失敗
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: 未 認証
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - CookieAuth: []
      summary: 自分 の ノート 一覧
      tags:
      - notes
    post:
      consumes:
      - application/json
      description: current user 名義 で 新規 note を 作る。 userId は body で 指定 でき ない (current
        user 固定)。
      parameters:
      - description: 作成 内容 (title 必須)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.noteCreateReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_norman6464_FreStyle_backend_internal_domain.Note'
        "400":
          description: バリデーション エラー or DB 失敗
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: 未 認証
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - CookieAuth: []
      summary: ノート 作成
      tags:
      - notes
  /notes/{id}:
    delete:
      description: current user 所有 の note を 削除。 WHERE user_id 絞り込み で 他人 の note は そもそも
        影響 を 受け ない。
      parameters:
      - description: ノート ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: 成功 (本文 なし)
        "400":
          description: DB 失敗
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: 未 認証
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - CookieAuth: []
      summary: ノート 削除
      tags:
      - notes
    put:
      consumes:
      - application/json
      description: 指定 note を 更新。 所有者 検証 を usecase 層 で 行い、 他人 の note は 403。
      parameters:
      - description: ノート ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新 内容
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.noteUpdateReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_norman6464_FreStyle_backend_internal_domain.Note'
        "400":
          description: バリデーション or DB 失敗
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: 未 認証
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "403":
          description: 他人 の note
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - CookieAuth: []
      summary: ノート 更新
      tags:
      - notes
  /notifications:
    get:
      description: current user の 通知 を 作成 日 降順 で 返す。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_norman6464_FreStyle_backend_internal_domain.Notification'
            type: array
        "400":
          description: DB 取得 失敗
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: 未 認証
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - CookieAuth: []
      summary: 通知 一覧
      tags:
      - notifications
  /notifications/{id}/read:
    patch:
      description: 指定 通知 を 既読 に する (所有者 検証 込み)。 同 ハンドラ は 旧 クライアント 互換 で PUT も 同じ パス
        で 受け付ける が、 OpenAPI で は PATCH を 標準 と して 1 つ だけ 表現 する。
      parameters:
      - description: 通知 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: 成功 (本文 なし)
        "400":
          description: DB 失敗
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: 未 認証
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - CookieAuth: []
      summary: 通知 単一 既読 化
      tags:
      - notifications
  /notifications/read-all:
    patch:
      description: current user の 全 未読 通知 を まとめて 既読 に する。 同 パス で PUT も 受け付ける 旧 互換
        ルート あり、 OpenAPI で は PATCH のみ 表現。
      produces:
      - application/json
      responses:
        "204":
          description: 成功 (本文 なし)
        "400":
          description: DB 失敗
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: 未 認証
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - CookieAuth: []
      summary: 通知 一括 既読 化
      tags:
      - notifications
  /notifications/unread-count:
    get:
      description: current user の 未読 通知 数 を 整数 で 返す (バッジ 表示 用)。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: integer
        "400":
          description: DB 失敗
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: 未 認証
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - CookieAuth: []
      summary: 未読 通知 数
      tags:
      - notifications
  /profile/{userId}:
    get:
      description: 指定 user (or current user) の displayName / bio / avatarUrl / status
        を 返す。 IDOR 対策 で 自分 以外 は 403。
      parameters:
      - description: 数字 ID または 'me'
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_norman6464_FreStyle_backend_internal_domain.ProfileView'
        "400":
          description: view 構築 失敗 (profile / users 取得 の 内部 エラー 等)
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: 未 認証
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "403":
          description: 他 user の userId 指定
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - CookieAuth: []
      summary: プロフィール 取得
      tags:
      - profile
    put:
      consumes:
      - application/json
      description: current user の displayName / bio / avatarUrl / status を 更新 する。
        他 user は 403。
      parameters:
      - description: 数字 ID または 'me'
        in: path
        name: userId
        required: true
        type: string
      - description: 更新 内容 (任意 フィールド の み)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.updateProfileReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_norman6464_FreStyle_backend_internal_domain.ProfileView'
        "400":
          description: バリデーション エラー
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: 未 認証
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "403":
          description: 他 user 指定
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - CookieAuth: []
      summary: プロフィール 更新
      tags:
      - profile
  /profile/me/onboarding/complete:
    post:
      description: Welcome 画面 「はじめる」 押下 で onboarded_at = NOW() に 更新。 冪等 (再 押下 で も
        初回 日時 保持)。
      responses:
        "204":
          description: 成功 (本文 なし)
        "401":
          description: 未 認証
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: 内部 エラー
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - CookieAuth: []
      summary: オンボーディング 完了 通知
      tags:
      - profile
  /sessions/{sessionId}/note:
    get:
      description: AI チャット セッション に 紐づく ノート (= 学習 者 が セッション ごと に 残した メモ) を 取得。 存在 し
        ない 場合 は 404。
      parameters:
      - description: AI チャット セッション ID
        in: path
        name: sessionId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_norman6464_FreStyle_backend_internal_domain.SessionNote'
        "400":
          description: DB 失敗
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: 未 認証
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: 未 作成
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - CookieAuth: []
      summary: セッション ノート 取得
      tags:
      - session-notes
    put:
      consumes:
      - application/json
      description: 指定 セッション の ノート を upsert。 userId は body で 受け取らず current user 固定
        (IDOR 対策)。
      parameters:
      - description: AI チャット セッション ID
        in: path
        name: sessionId
        required: true
        type: integer
      - description: content (userId は current user 固定 / body で 受け取らない)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.sessionNoteUpsertReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_norman6464_FreStyle_backend_internal_domain.SessionNote'
        "400":
          description: バリデーション or DB 失敗
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: 未 認証
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - CookieAuth: []
      summary: セッション ノート 作成 / 更新
      tags:
      - session-notes
securityDefinitions:
  CookieAuth:
    description: Cognito 由来 の JWT を HttpOnly Cookie で 送る。 ログイン 後 自動 付与。
    in: header
    name: Cookie
    type: apiKey
swagger: "2.0"

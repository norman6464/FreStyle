  /auth/logout:
    post:
      description: HttpOnly Cookie の access / refresh token を 消去 する。 Cognito 側 の セッション
        は 別途 hosted UI で 切る。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.messageResponse'
      summary: ログアウト
      tags:
      - auth
  /auth/me:
    get:
      description: Cookie 認証 を 元 に 現在 ログイン 中 の user 情報 (id / email / role / isAdmin
        / onboarded 等) を 返す。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.meResponse'
        "401":
          description: 未 認証
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "404":
          description: DB に user が ない (Cognito 側 だけ 存在)
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "500":
          description: DB / repository 取得 失敗
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - CookieAuth: []
      summary: current user 情報 取得
      tags:
      - auth
  /auth/refresh:
    post:
      description: refresh_token Cookie で access_token を 再 発行 し HttpOnly Cookie に
        セット する。 失敗 (refresh 切れ 等) は 401 で Cookie クリア。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.messageResponse'
        "401":
          description: refresh_token 欠落 / 無効
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "429":
          description: レート制限超過
          headers:
            Retry-After:
              description: '再試行までの秒数 (例: 60)'
              type: string
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "502":
          description: Cognito 到達 不可
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      summary: アクセス トークン リフレッシュ
      tags:
      - auth
  /code/execute:
    post:
      consumes:
      - application/json
      description: trainee が 書いた コード を サーバ 側 sandbox で 実行 し stdout/stderr/exitCode
        を 返す。 language は php / go / bash。
      parameters:
      - description: コード + 言語
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.codeExecuteRequest'
      produces:

<svg width="400" height="150" viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景色なし（透過） -->
  <defs>
    <!-- image_0.pngの鮮やかなブルーを正確に抽出 -->
    <style type="text/css">
      .st0{fill:#2e7df6;} 
      .text-style {
        /* キリっとしたモダンなサンセリフ（ゴシック体）書体を指定 */
        font-family: 'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif;
        font-weight: 700; /* 太めのウェイトで力強さを出す */
        font-style: normal;
        letter-spacing: -1px; /* 文字間を詰めて締まった印象に */
      }
    </style>
  </defs>
  
  <g transform="translate(20, 85)">
    <!-- 幾何学的でシャープな抽象飛翔マーク（freeeの鳥をより鋭角化） -->
    <g transform="translate(0, -35)">
      <!-- 3つの鋭い翼のモチーフ -->
      <path class="st0" d="M15,10 L35,25 L15,40 Z" fill-opacity="0.8"/> <!-- 下側の羽 -->
      <path class="st0" d="M30,5 L50,20 L30,35 Z" fill-opacity="0.9"/> <!-- 中央の羽 -->
      <path class="st0" d="M45,0 L65,15 L45,30 Z"/> <!-- 上側の羽 -->
    </g>
    
    <!-- キリっとしたサンセリフテキスト「FreStyle」 -->
    <text x="80" y="0" class="st0 text-style" font-size="52">
      FreStyle
    </text>
  </g>
</svg>
